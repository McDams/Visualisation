<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Series - Sensor Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
</head>
<body class="bg-gray-900 text-white">
    <header class="bg-gray-800 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-3xl font-bold text-cyan-400">📈 Time Series Analysis</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Time Series Controls -->
        <section class="mb-8">
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Measurement Type:</label>
                        <select id="ts-type" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Sensor(s):</label>
                        <select id="ts-sensors" multiple class="w-full bg-gray-700 rounded px-4 py-2 text-white" size="3">
                            <option value="">-- Select --</option>
                        </select>
                        <p class="text-xs text-gray-400 mt-1">Hold Ctrl to select multiple</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Days:</label>
                        <input type="number" id="ts-days" value="7" min="1" max="365" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Chart Type:</label>
                        <select id="ts-chart-type" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="line">Line Chart</option>
                            <option value="area">Area Chart</option>
                            <option value="bar">Bar Chart</option>
                        </select>
                    </div>
                    <div class="flex items-end gap-2">
                        <button onclick="loadTimeSeries()" class="flex-1 bg-cyan-600 hover:bg-cyan-700 rounded px-4 py-2 font-semibold">
                            Load
                        </button>
                        <button onclick="exportChartData()" class="flex-1 bg-gray-700 hover:bg-gray-600 rounded px-4 py-2 font-semibold">
                            Export
                        </button>
                    </div>
                </div>

                <!-- Quick presets -->
                <div class="flex gap-2 flex-wrap">
                    <button onclick="setTimeRange(1)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm">1 Day</button>
                    <button onclick="setTimeRange(7)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm">1 Week</button>
                    <button onclick="setTimeRange(30)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm">1 Month</button>
                    <button onclick="setTimeRange(90)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm">3 Months</button>
                    <button onclick="setTimeRange(365)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm">1 Year</button>
                </div>
            </div>
        </section>

        <!-- Time Series Chart -->
        <section class="mb-8">
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <h2 class="text-xl font-semibold mb-4">Time Series Data</h2>
                <div class="relative" style="height: 400px;">
                    <canvas id="timeSeriesChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Statistics Table -->
        <section class="mb-8">
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <h2 class="text-xl font-semibold mb-4">Statistics by Sensor</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left">Sensor</th>
                                <th class="px-4 py-3 text-right">Min</th>
                                <th class="px-4 py-3 text-right">Max</th>
                                <th class="px-4 py-3 text-right">Avg</th>
                                <th class="px-4 py-3 text-right">Latest</th>
                                <th class="px-4 py-3 text-right">Count</th>
                                <th class="px-4 py-3 text-center">Trend</th>
                            </tr>
                        </thead>
                        <tbody id="stats-tbody">
                            <tr class="text-gray-400">
                                <td class="px-4 py-3">Load data to see statistics</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Data Points Table -->
        <section>
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <h2 class="text-xl font-semibold mb-4">Raw Data Points</h2>
                <div class="flex gap-4 mb-4">
                    <input type="text" id="search-input" placeholder="Search data..." class="flex-1 bg-gray-700 rounded px-4 py-2 text-white">
                    <button onclick="toggleTableVisibility()" class="bg-gray-700 hover:bg-gray-600 rounded px-4 py-2 font-semibold">
                        Hide/Show
                    </button>
                </div>
                <div id="data-table-container" class="overflow-x-auto max-h-96">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-700 sticky top-0">
                            <tr>
                                <th class="px-4 py-3 text-left">Time</th>
                                <th class="px-4 py-3 text-left">Sensor</th>
                                <th class="px-4 py-3 text-right">Value</th>
                                <th class="px-4 py-3 text-left">Type</th>
                                <th class="px-4 py-3 text-left">Unit</th>
                            </tr>
                        </thead>
                        <tbody id="data-tbody">
                            <tr class="text-gray-400">
                                <td class="px-4 py-3">No data loaded</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let chartInstance = null;
        let rawData = [];

        async function initializePage() {
            try {
                // Load measurement types
                const latest = await fetch(`${API_URL}/measurements/latest`).then(r => r.json());
                const typeSelect = document.getElementById('ts-type');
                
                for (const typeCode of Object.keys(latest)) {
                    const option = document.createElement('option');
                    option.value = typeCode;
                    option.textContent = typeCode;
                    typeSelect.appendChild(option);
                }
                
                // Load sensors
                const sensors = await fetch(`${API_URL}/sensors`).then(r => r.json());
                const sensorSelect = document.getElementById('ts-sensors');
                
                sensors.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s.id;
                    option.textContent = s.name;
                    sensorSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error initializing:', error);
            }
        }

        function setTimeRange(days) {
            document.getElementById('ts-days').value = days;
            loadTimeSeries();
        }

        async function loadTimeSeries() {
            const typeCode = document.getElementById('ts-type').value;
            const sensorIds = Array.from(document.getElementById('ts-sensors').selectedOptions).map(o => o.value);
            const days = document.getElementById('ts-days').value;
            const chartType = document.getElementById('ts-chart-type').value;

            if (!typeCode || sensorIds.length === 0) {
                alert('Please select a type and at least one sensor');
                return;
            }

            try {
                const datasets = [];
                const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
                
                for (let i = 0; i < sensorIds.length; i++) {
                    const res = await fetch(
                        `${API_URL}/measurements/timeseries?measurement_type=${typeCode}&sensor_id=${sensorIds[i]}&days=${days}`
                    );
                    const data = await res.json();
                    
                    if (!data.data_points) continue;
                    
                    const color = colors[i % colors.length];
                    rawData = [...rawData, ...data.data_points];
                    
                    const dataset = {
                        label: data.data_points[0]?.sensor_name || `Sensor ${sensorIds[i]}`,
                        data: data.data_points.map(p => p.value),
                        borderColor: color,
                        backgroundColor: chartType === 'area' ? color + '33' : undefined,
                        fill: chartType === 'area',
                        tension: 0.4,
                        pointRadius: 2,
                        pointHoverRadius: 6
                    };
                    
                    datasets.push(dataset);
                }

                // Create labels (timestamps)
                const labels = [];
                if (rawData.length > 0) {
                    rawData.forEach(p => {
                        const label = new Date(p.time).toLocaleDateString() + ' ' + new Date(p.time).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
                        if (!labels.includes(label)) labels.push(label);
                    });
                }

                // Destroy old chart
                if (chartInstance) chartInstance.destroy();

                // Create new chart
                const ctx = document.getElementById('timeSeriesChart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: chartType === 'line' || chartType === 'area' ? 'line' : chartType,
                    data: {
                        labels: labels,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#fff' },
                                position: 'top'
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                titleColor: '#fff',
                                bodyColor: '#fff'
                            }
                        },
                        scales: {
                            y: {
                                ticks: { color: '#fff' },
                                grid: { color: '#374151' },
                                title: {
                                    display: true,
                                    text: 'Value',
                                    color: '#fff'
                                }
                            },
                            x: {
                                ticks: { color: '#fff' },
                                grid: { color: '#374151' }
                            }
                        }
                    }
                });

                // Update statistics table
                updateStatisticsTable(sensorIds, typeCode, days);
                updateDataTable(rawData);
            } catch (error) {
                console.error('Error loading time series:', error);
            }
        }

        function updateStatisticsTable(sensorIds, typeCode, days) {
            const tbody = document.getElementById('stats-tbody');
            tbody.innerHTML = '';

            // Group data by sensor
            const bySensor = {};
            rawData.forEach(p => {
                if (!bySensor[p.sensor_name]) bySensor[p.sensor_name] = [];
                bySensor[p.sensor_name].push(p.value);
            });

            for (const [sensorName, values] of Object.entries(bySensor)) {
                if (values.length === 0) continue;
                
                const min = Math.min(...values);
                const max = Math.max(...values);
                const avg = values.reduce((a, b) => a + b, 0) / values.length;
                const trend = values[values.length - 1] > values[0] ? '📈' : values[values.length - 1] < values[0] ? '📉' : '→';

                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-gray-700';
                row.innerHTML = `
                    <td class="px-4 py-3 font-medium">${sensorName}</td>
                    <td class="px-4 py-3 text-right text-blue-400">${min.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right text-red-400">${max.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right text-green-400">${avg.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right">${values[values.length - 1]?.toFixed(2) || '-'}</td>
                    <td class="px-4 py-3 text-right text-gray-400">${values.length}</td>
                    <td class="px-4 py-3 text-center text-lg">${trend}</td>
                `;
                tbody.appendChild(row);
            }
        }

        function updateDataTable(data) {
            const tbody = document.getElementById('data-tbody');
            tbody.innerHTML = '';

            // Sort by time descending
            const sorted = [...data].sort((a, b) => new Date(b.time) - new Date(a.time));

            sorted.slice(0, 100).forEach(p => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-700 hover:bg-gray-700';
                row.innerHTML = `
                    <td class="px-4 py-3 text-sm">${new Date(p.time).toLocaleString()}</td>
                    <td class="px-4 py-3">${p.sensor_name}</td>
                    <td class="px-4 py-3 text-right font-semibold">${p.value.toFixed(2)}</td>
                    <td class="px-4 py-3">${p.measurement_type || '-'}</td>
                    <td class="px-4 py-3">${p.unit || '-'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function toggleTableVisibility() {
            const container = document.getElementById('data-table-container');
            container.classList.toggle('max-h-96');
            container.classList.toggle('max-h-none');
        }

        async function exportChartData() {
            if (rawData.length === 0) {
                alert('No data to export. Load data first.');
                return;
            }

            const csv = [
                ['Time', 'Sensor', 'Value', 'Type', 'Unit'],
                ...rawData.map(p => [
                    p.time,
                    p.sensor_name,
                    p.value,
                    p.measurement_type,
                    p.unit
                ])
            ].map(row => row.join(',')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `timeseries_${Date.now()}.csv`;
            a.click();
        }

        // Initialize on load
        initializePage();
    </script>

    <footer class="text-center py-6 text-gray-400 mt-12 bg-gray-800">
        <p>&copy; 2026 Sensor Visualization System. All rights reserved.</p>
    </footer>
</body>
</html>
