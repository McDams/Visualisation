<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Dashboard - Sensor Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
</head>
<body class="bg-gray-900 text-white">
    <header class="bg-gray-800 shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-3xl font-bold text-blue-400">📈 Statistics Dashboard</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Distribution Section -->
        <section class="mb-8">
            <h2 class="text-2xl font-semibold mb-6">Distribution Analysis</h2>
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Measurement Type:</label>
                        <select id="dist-type" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select type --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Sensor (optional):</label>
                        <select id="dist-sensor" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- All sensors --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Days:</label>
                        <input type="number" id="dist-days" value="7" min="1" max="365" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                    </div>
                    <div class="flex items-end">
                        <button onclick="loadDistribution()" class="w-full bg-blue-600 hover:bg-blue-700 rounded px-4 py-2 font-semibold">
                            Load Distribution
                        </button>
                    </div>
                </div>
                <canvas id="distributionChart" height="80"></canvas>
            </div>
        </section>

        <!-- Correlation Section -->
        <section class="mb-8">
            <h2 class="text-2xl font-semibold mb-6">Correlation Analysis</h2>
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Measurement Type:</label>
                        <select id="corr-type" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select type --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Sensor 1:</label>
                        <select id="corr-sensor1" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Sensor 2:</label>
                        <select id="corr-sensor2" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Days:</label>
                        <input type="number" id="corr-days" value="7" min="1" max="365" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                    </div>
                    <div class="flex items-end">
                        <button onclick="loadCorrelation()" class="w-full bg-blue-600 hover:bg-blue-700 rounded px-4 py-2 font-semibold">
                            Calculate
                        </button>
                    </div>
                </div>
                <div id="correlation-result" class="text-center text-gray-400">
                    Select sensors and click Calculate
                </div>
            </div>
        </section>

        <!-- Anomalies Section -->
        <section class="mb-8">
            <h2 class="text-2xl font-semibold mb-6">Anomaly Detection</h2>
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Sensor:</label>
                        <select id="anom-sensor" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Measurement Type:</label>
                        <select id="anom-type" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                            <option value="">-- Select --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Days / Threshold:</label>
                        <input type="number" id="anom-days" value="7" min="1" max="365" class="w-full bg-gray-700 rounded px-4 py-2 text-white">
                    </div>
                    <div class="flex items-end">
                        <button onclick="loadAnomalies()" class="w-full bg-red-600 hover:bg-red-700 rounded px-4 py-2 font-semibold">
                            Detect Anomalies
                        </button>
                    </div>
                </div>
                <div id="anomalies-result" class="space-y-3">
                    <p class="text-gray-400">No anomalies detected yet</p>
                </div>
            </div>
        </section>

        <!-- Trend Analysis -->
        <section>
            <h2 class="text-2xl font-semibold mb-6">Trend Analysis</h2>
            <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
                <div id="trends-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <p class="text-gray-400">Loading trends...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';

        async function initializeSelects() {
            try {
                const typesRes = await fetch(`${API_URL}/sensors/active`); // We need a types endpoint
                const sensorsRes = await fetch(`${API_URL}/sensors`);
                
                const sensors = await sensorsRes.json();
                
                // Populate sensor selects
                const sensorSelects = ['dist-sensor', 'corr-sensor1', 'corr-sensor2', 'anom-sensor'];
                sensorSelects.forEach(selectId => {
                    const select = document.getElementById(selectId);
                    sensors.forEach(s => {
                        const option = document.createElement('option');
                        option.value = s.id;
                        option.textContent = s.name;
                        select.appendChild(option);
                    });
                });
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        async function loadDistribution() {
            const typeId = document.getElementById('dist-type').value;
            const sensorId = document.getElementById('dist-sensor').value;
            const days = document.getElementById('dist-days').value;
            
            if (!typeId) {
                alert('Please select a measurement type');
                return;
            }

            try {
                const params = new URLSearchParams({
                    measurement_type_id: typeId,
                    days: days,
                    bins: 10
                });
                if (sensorId) params.append('sensor_id', sensorId);
                
                const res = await fetch(`${API_URL}/statistics/distribution?${params}`);
                const data = await res.json();

                const ctx = document.getElementById('distributionChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: `Distribution (${data.unit})`,
                            data: data.bins,
                            backgroundColor: '#3b82f6',
                            borderColor: '#1d4ed8',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#fff' } }
                        },
                        scales: {
                            y: {
                                ticks: { color: '#fff' },
                                grid: { color: '#374151' }
                            },
                            x: {
                                ticks: { color: '#fff' },
                                grid: { color: '#374151' }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading distribution:', error);
            }
        }

        async function loadCorrelation() {
            const typeId = document.getElementById('corr-type').value;
            const sensor1 = document.getElementById('corr-sensor1').value;
            const sensor2 = document.getElementById('corr-sensor2').value;
            const days = document.getElementById('corr-days').value;
            
            if (!typeId || !sensor1 || !sensor2) {
                alert('Please select type and both sensors');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/statistics/correlation?measurement_type_id=${typeId}&sensor1_id=${sensor1}&sensor2_id=${sensor2}&days=${days}`);
                const data = await res.json();

                const result = document.getElementById('correlation-result');
                const corrColor = data.correlation > 0.7 ? 'text-green-400' : data.correlation < -0.7 ? 'text-red-400' : 'text-yellow-400';
                
                result.innerHTML = `
                    <div class="bg-gray-700 rounded-lg p-6">
                        <h3 class="text-xl font-semibold mb-4">${data.title}</h3>
                        <p class="text-sm text-gray-400 mb-2">Correlation Coefficient:</p>
                        <p class="text-4xl font-bold ${corrColor}">${data.correlation}</p>
                        <p class="text-sm text-gray-400 mt-4">Data Points: ${data.data_points_count}</p>
                        <p class="text-xs text-gray-500 mt-2">
                            ${data.correlation > 0.7 ? '✅ Strong positive correlation' :
                              data.correlation < -0.7 ? '⚠️ Strong negative correlation' :
                              data.correlation > 0.3 ? '→ Weak positive correlation' :
                              data.correlation < -0.3 ? '← Weak negative correlation' :
                              '◐ No significant correlation'}
                        </p>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading correlation:', error);
            }
        }

        async function loadAnomalies() {
            const sensorId = document.getElementById('anom-sensor').value;
            const typeId = document.getElementById('anom-type').value;
            const days = document.getElementById('anom-days').value;
            
            if (!sensorId || !typeId) {
                alert('Please select sensor and type');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/statistics/anomalies/${sensorId}?measurement_type_id=${typeId}&days=${days}`);
                const data = await res.json();

                const result = document.getElementById('anomalies-result');
                
                if (data.anomalies.length === 0) {
                    result.innerHTML = `
                        <div class="bg-green-900 border border-green-500 rounded-lg p-4">
                            <p class="text-green-400 font-semibold">✅ No anomalies detected</p>
                            <p class="text-sm text-green-300">Mean: ${data.mean} | StDev: ${data.stdev}</p>
                        </div>
                    `;
                } else {
                    result.innerHTML = `
                        <div class="bg-red-900 border border-red-500 rounded-lg p-4 mb-4">
                            <p class="text-red-400 font-semibold">🚨 ${data.anomalies.length} anomalies detected</p>
                            <p class="text-sm text-red-300">Mean: ${data.mean} | Expected Range: ${data.anomalies[0].expected_range}</p>
                        </div>
                        ${data.anomalies.map(a => `
                            <div class="bg-gray-700 rounded p-3 text-sm">
                                <p class="font-semibold">${new Date(a.time).toLocaleString()}</p>
                                <p>Value: <span class="text-red-400 font-bold">${a.value}</span></p>
                                <p>Z-Score: <span class="text-orange-400">${a.z_score}</span></p>
                            </div>
                        `).join('')}
                    `;
                }
            } catch (error) {
                console.error('Error loading anomalies:', error);
            }
        }

        // Initialize on page load
        initializeSelects();
    </script>

    <footer class="text-center py-6 text-gray-400 mt-12 bg-gray-800">
        <p>&copy; 2026 Sensor Visualization System. All rights reserved.</p>
    </footer>
</body>
</html>
